name: Generate Yoga Poses Wiki Wiki

on:
  schedule:
    - cron: '0 2 * * *'  # 毎朝11:00 JST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_yoga_wiki.py --limit 5
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: Yoga Poses Wiki articles $(date '+%Y-%m-%d')"
          git push
